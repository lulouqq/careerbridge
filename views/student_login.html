<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"> <!-- Set encoding -->
  <title>Student Login – CareerBridge</title> <!-- Page title -->
  <link rel="stylesheet" href="/css/student_login.css"> <!-- CSS for styling -->
</head>

<body>

  <!-- Header with site name -->
  <header>
    <h1>CareerBridge</h1>
  </header>

  <main>
    <h2>Student Login</h2>

    <!-- Login form for students -->
    <form action="/login-student" method="POST">
      <!-- Email input -->
      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <!-- Password input -->
      <label for="password">Password:</label><br>
      <input type="password" id="password" name="password" required><br><br>

      <button type="submit">Login</button> <!-- Submit button -->
    </form>

    <!-- Feedback messages -->
    <div id="error" style="color: red; margin-top: 10px;"></div> <!-- Error text -->
    <div id="success" style="color: green; margin-top: 10px;"></div> <!-- Success text -->

    <!-- Link to signup page -->
    <p>Don't have an account? <a href="/student_signup">Sign up here</a>.</p>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 CareerBridge</p>
  </footer>

  <script src="/js/student_login.js"></script> <!-- JS logic -->

</body>

</html>
