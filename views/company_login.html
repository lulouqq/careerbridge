<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"> <!-- Set character encoding -->
  <title>Company Login – CareerBridge</title> <!-- Page title -->
  <link rel="stylesheet" href="css/company_login.css"> <!-- Link to CSS file -->
</head>

<body>

  <!-- Header with site name -->
  <header>
    <h1>CareerBridge</h1>
  </header>

  <main>
    <h2>Company Login</h2>

    <!-- Login form for companies -->
    <form action="/login-company" method="POST">
      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="password">Password:</label><br>
      <input type="password" id="password" name="password" required><br><br>

      <button type="submit">Login</button> <!-- Submit button -->
    </form>

    <!-- Feedback messages -->
    <div id="error" style="color: red; margin-top: 10px;"></div> <!-- Error message -->
    <div id="success" style="color: green; margin-top: 10px;"></div> <!-- Success message -->

    <!-- Signup link -->
    <p>Don't have an account? <a href="/company_signup">Sign up here</a>.</p>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 CareerBridge</p>
  </footer>

  <script src="/js/company_login.js"></script> <!-- JavaScript file -->

</body>

</html>
